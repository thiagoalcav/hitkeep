root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -tags \"hashicorpmetrics s3 billing tenancy\" -o ./tmp/main ./cmd/hitkeep/main.go"
bin = "./tmp/main"
args_bin = ["-log-level=debug"]
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
exclude_dir = ["assets", "tmp", "vendor", "frontend", "public", "node_modules", "hitkeep.db"]
delay = 1000
stop_on_error = true
send_interrupt = false
kill_delay = 500

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true
