root = "."
tmp_dir = "tmp"

[build]
# Build the binary to the tmp directory
cmd = "go build -tags \"$(./scripts/go-build-tags.sh)\" -o ./tmp/main ./cmd/hitkeep/main.go"
# Binary and default arguments to run after each successful build
entrypoint = ["./tmp/main", "-log-level=debug"]
# Watch for changes in these file extensions
include_ext = ["go", "tpl", "tmpl", "html", "sql"]
# Ignore these directories to prevent infinite loops or unnecessary rebuilds
exclude_dir = ["assets", "tmp", "vendor", "frontend", "public", "node_modules", "hitkeep.db"]
# Delay in ms after file change before build
delay = 1000
# Stop running old binary when build errors occur
stop_on_error = true
# Send Interrupt signal before killing process (windows support)
send_interrupt = false
# Delay after sending Interrupt signal
kill_delay = 500

[log]
# Show log time
time = false

[color]
# Customize each part's color. If no color found, use the raw app log.
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Delete tmp directory on exit
clean_on_exit = true
