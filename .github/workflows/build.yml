name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      version_string:
        required: true
        type: string
      meta_config:
        required: true
        type: string
    secrets:
      token:
        required: true

jobs:
  build-and-push:
    name: Build and Push Cross-Platform Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Build Tracker Snippet
        working-directory: frontend/tracker
        run: |
          npm ci
          npm run build

      - name: Build Dashboard Application
        working-directory: frontend/dashboard
        run: |
          npm ci
          npm run build:prod

      - name: Prepare Public Directory for Docker Build
        run: |
          mkdir -p public
          cp -r frontend/dashboard/dist/dashboard/browser/* public/

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: ${{ inputs.meta_config }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64/v8
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            HITKEEP_VERSION=${{ inputs.version_string }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true