name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ (github.event_name == 'pull_request' && github.event.pull_request.number) || 'main' }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Golang codebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11
      - name: Vet API
        run: go vet ./...
      - name: Staticcheck API
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...
      - name: Test API
        run: go test -race ./...
  mcp-audit:
    name: Audit MCP surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Audit MCP protocol surface
        run: go test ./internal/mcpserver -run 'TestMCP.*Audit'
      - name: Validate MCP registry metadata
        run: tests/scripts/mcp-audit.sh --schema-only

  lint-dashboard:
    name: Lint Dashboard (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Fmt check
        working-directory: frontend/dashboard
        run: npm run fmt:check
      - name: Lint dashboard
        working-directory: frontend/dashboard
        run: npm run lint

  test-dashboard:
    name: Test Dashboard (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Browsers
        working-directory: frontend/dashboard
        run: npx playwright install --with-deps
      - name: Test dashboard
        working-directory: frontend/dashboard
        run: npm run test -- --watch=false --no-progress

  e2e-dashboard:
    name: E2E Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Browsers
        working-directory: frontend/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run seeded e2e suite
        working-directory: frontend/dashboard
        run: npm run e2e
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            frontend/dashboard/playwright-report
            frontend/dashboard/test-results
          if-no-files-found: ignore
