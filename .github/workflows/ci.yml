name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint Golang codebase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve Go build tags
        id: go-build-tags
        shell: bash
        run: |
          set -euo pipefail
          echo "goflags=$(./scripts/go-build-tags.sh goflags)" >> "$GITHUB_OUTPUT"
          echo "golangci_args=$(./scripts/go-build-tags.sh golangci)" >> "$GITHUB_OUTPUT"
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12
          args: ${{ steps.go-build-tags.outputs.golangci_args }}
      - name: Vet API
        env:
          GOFLAGS: ${{ steps.go-build-tags.outputs.goflags }}
        run: go vet ./...
      - name: Staticcheck API
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 -tags "$(./scripts/go-build-tags.sh)" ./...
      - name: Test API
        env:
          GOFLAGS: ${{ steps.go-build-tags.outputs.goflags }}
        run: go test -race ./...
  mcp-audit:
    name: Audit MCP surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve Go build tags
        id: go-build-tags
        shell: bash
        run: echo "goflags=$(./scripts/go-build-tags.sh goflags)" >> "$GITHUB_OUTPUT"
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc
      - name: Audit MCP protocol surface
        env:
          GOFLAGS: ${{ steps.go-build-tags.outputs.goflags }}
        run: go test ./internal/mcpserver -run 'TestMCP.*Audit'
      - name: Validate MCP registry metadata
        run: tests/scripts/mcp-audit.sh --schema-only

  lint-dashboard:
    name: Lint Dashboard (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Fmt check
        working-directory: frontend/dashboard
        run: npm run fmt:check
      - name: Lint dashboard
        working-directory: frontend/dashboard
        run: npm run lint

  test-dashboard:
    name: Test Dashboard (Angular)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Restore Playwright browser cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/dashboard/package-lock.json') }}
      - name: Install dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Browsers
        working-directory: frontend/dashboard
        run: npx playwright install --with-deps chromium
      - name: Test dashboard
        working-directory: frontend/dashboard
        run: npm run test -- --watch=false --no-progress

  e2e-dashboard:
    name: E2E Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json
      - name: Restore Playwright browser cache
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/dashboard/package-lock.json') }}
      - name: Install dashboard dependencies
        working-directory: frontend/dashboard
        run: npm ci --no-audit --no-fund
      - name: Install Playwright Browsers
        working-directory: frontend/dashboard
        run: npx playwright install --with-deps chromium
      - name: Run dashboard e2e suite
        working-directory: frontend/dashboard
        env:
          HITKEEP_E2E_BIN_PATH: ${{ runner.temp }}/hitkeep-e2e
        run: npm run e2e
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            frontend/dashboard/playwright-report
            frontend/dashboard/test-results
          if-no-files-found: ignore
