name: Refresh IP Metadata

on:
  schedule:
    - cron: "0 19 1,15 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  refresh:
    name: Refresh embedded IP metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate embedded IP metadata
        env:
          IP2LOCATION_DOWNLOAD_TOKEN: ${{ secrets.IP2LOCATION_DOWNLOAD_TOKEN }}
        run: go run ./cmd/ipmeta-generate

      - name: Test IP metadata generator
        run: go test ./cmd/ipmeta-generate ./internal/ipmeta ./internal/ipmeta/ipmetagen

      - name: Open refresh pull request
        env:
          GH_TOKEN: ${{ secrets.GHT }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- internal/ipmeta; then
            echo "IP metadata is already up to date."
            exit 0
          fi

          branch="automation/ipmeta-data-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git switch -c "$branch"
          git add internal/ipmeta
          git commit -m "chore(analytics): refresh IP metadata data"
          git push --force-with-lease origin "$branch"

          body=$(printf '%s\n\n%s\n\n```sh\n%s\n```' \
            "Refreshes compressed HitKeep IP metadata assets for country, city, and ASN/provider lookup." \
            "Generated with:" \
            "go run ./cmd/ipmeta-generate")

          pr_number="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" \
              --title "chore(analytics): refresh IP metadata data" \
              --body "$body"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(analytics): refresh IP metadata data" \
              --body "$body"
          fi
