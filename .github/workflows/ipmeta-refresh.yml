name: Refresh IP Metadata

on:
  schedule:
    - cron: "0 19 1,15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh embedded IP metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Generate embedded IP metadata
        env:
          IP2LOCATION_DOWNLOAD_TOKEN: ${{ secrets.IP2LOCATION_DOWNLOAD_TOKEN }}
        run: go run ./cmd/ipmeta-generate

      - name: Test IP metadata generator
        run: go test ./cmd/ipmeta-generate ./internal/ipmeta ./internal/ipmeta/ipmetagen

      - name: Open refresh pull request
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- internal/ipmeta; then
            echo "IP metadata is already up to date."
            exit 0
          fi

          branch="automation/ipmeta-data-refresh"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add internal/ipmeta
          git commit -m "chore(analytics): refresh IP metadata data"
          git push --force-with-lease origin "$branch"

          body=$(printf '%s\n\n%s\n\n```sh\n%s\n```' \
            "Refreshes compressed HitKeep IP metadata assets for country, city, and ASN/provider lookup." \
            "Generated with:" \
            "go run ./cmd/ipmeta-generate")

          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" \
              --title "chore(analytics): refresh IP metadata data" \
              --body "$body"
          else
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore(analytics): refresh IP metadata data" \
              --body "$body"
          fi
