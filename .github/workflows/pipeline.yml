name: Build Pipeline

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version string to embed in the binary (e.g., v1.0.0 or snapshot-abc)"
      meta_config:
        required: true
        type: string
        description: "Configuration for docker/metadata-action tags"
      cloud_go_build_tags:
        required: false
        type: string
        default: "s3 billing tenancy"
        description: "Build tags for the cloud binary artifacts"
      upload_to_release:
        required: false
        type: boolean
        default: false
        description: "Whether to upload binaries to a GitHub Release"
      release_prerelease:
        required: false
        type: boolean
        default: false
        description: "Whether to create the target GitHub Release as a prerelease before uploading binaries"
      release_tag_name:
        required: false
        type: string
        description: "The tag name of the release to upload to (required if upload_to_release is true)"
    secrets:
      token:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-dashboard:
    name: Build dashboard assets
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Build Dashboard
        working-directory: frontend/dashboard
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod

      - name: Prepare Public Assets
        run: |
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          cp -r frontend/dashboard/dist/dashboard/browser/* public/
          tar -czf public-assets.tar.gz -C public .

      - uses: actions/upload-artifact@v7
        with:
          name: public-assets-${{ inputs.version }}
          path: public-assets.tar.gz
          retention-days: 5
          compression-level: 0

  build-binaries:
    name: Build ${{ matrix.label }}
    needs: build-dashboard
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - id: linux-amd64
            label: Linux amd64
            runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64
            glibc_baseline: "2.35"
          - id: linux-arm64
            label: Linux arm64
            runner: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
            artifact_suffix: linux-arm64
            glibc_baseline: "2.35"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/setup-go@v6
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Restore embedded public assets
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$archive" -C public

      - name: Build native Linux binaries on Ubuntu ${{ matrix.glibc_baseline }}
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          HITKEEP_VERSION: ${{ inputs.version }}
          CLOUD_GO_BUILD_TAGS: ${{ inputs.cloud_go_build_tags }}
        run: |
          set -euo pipefail

          # DuckDB's prebuilt linux bindings currently need a newer libstdc++
          # than Bullseye provides; Ubuntu 22.04 satisfies that requirement.
          export CC=gcc
          export CXX=g++

          go build \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

          go build \
            -tags "${CLOUD_GO_BUILD_TAGS}" \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-cloud-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.id }}
          path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}
          retention-days: 5
          compression-level: 0

      - name: Attest Binaries
        uses: actions/attest@v4
        with:
          subject-path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}

  upload-release-binaries:
    name: Upload release binaries
    needs: build-binaries
    if: ${{ inputs.upload_to_release && inputs.release_tag_name != '' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-*
          path: .
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -maxdepth 1 -type f -name 'hitkeep*' -print | sort)
          test "${#files[@]}" -gt 0
          sha256sum "${files[@]}" > SHA256SUMS
          files+=(SHA256SUMS)

          if [[ "${{ inputs.release_prerelease }}" == "true" ]]; then
            short_sha="${GITHUB_SHA::7}"
            cat > release-notes.md <<EOF
          Automated prerelease build for ${GITHUB_SHA}.

          - Commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

            if gh release view "${{ inputs.release_tag_name }}" >/dev/null 2>&1; then
              gh release edit "${{ inputs.release_tag_name }}" \
                --prerelease \
                --target "${GITHUB_SHA}" \
                --title "Snapshot ${short_sha}" \
                --notes-file release-notes.md
              gh release upload "${{ inputs.release_tag_name }}" "${files[@]}" --clobber
            else
              gh release create "${{ inputs.release_tag_name }}" "${files[@]}" \
                --target "${GITHUB_SHA}" \
                --prerelease \
                --latest=false \
                --title "Snapshot ${short_sha}" \
                --notes-file release-notes.md
            fi

            exit 0
          fi

          gh release upload "${{ inputs.release_tag_name }}" "${files[@]}" --clobber

  build-and-push-image:
    name: Build and push Docker image
    needs:
      - build-dashboard
      - build-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/download-artifact@v8
        with:
          pattern: binaries-linux-*
          path: .
          merge-multiple: true

      - name: Restore Docker build inputs
        shell: bash
        run: |
          set -euo pipefail

          public_archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$public_archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$public_archive" -C public

          find . -maxdepth 1 -type f -name 'hitkeep-cloud-linux-*' -delete

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          tags: ${{ inputs.meta_config }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          provenance: mode=max
          sbom: true
          build-args: HITKEEP_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sync Docker Hub README
        shell: bash
        env:
          DOCKERHUB_DESCRIPTION: Privacy-first analytics for humans and AI agents, self-hosted or in EU/US cloud.
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPOSITORY: hitkeep
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          .github/scripts/render-dockerhub-readme.sh "$GITHUB_SHA" > dockerhub-readme.md

          token="$(
            jq -n \
              --arg username "$DOCKERHUB_USERNAME" \
              --arg password "$DOCKERHUB_TOKEN" \
              '{username: $username, password: $password}' |
            curl -fsSL \
              -H "Content-Type: application/json" \
              -d @- \
              https://hub.docker.com/v2/users/login/ |
            jq -r .token
          )"

          test -n "$token"
          test "$token" != "null"

          jq -n \
            --arg description "$DOCKERHUB_DESCRIPTION" \
            --rawfile full_description dockerhub-readme.md \
            '{description: $description, full_description: $full_description}' |
          curl -fsSL \
            -X PATCH \
            -H "Authorization: JWT ${token}" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://hub.docker.com/v2/repositories/${DOCKERHUB_NAMESPACE}/${DOCKERHUB_REPOSITORY}/" >/dev/null

      - name: Attest GHCR Image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub Image
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
