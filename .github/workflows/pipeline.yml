name: Build Pipeline

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version string to embed in the binary (e.g., v1.0.0 or snapshot-abc)"
      meta_config:
        required: true
        type: string
        description: "Configuration for docker/metadata-action tags"
      checkout_ref:
        required: false
        type: string
        default: ""
        description: "Git ref or SHA to check out for build jobs (defaults to the workflow SHA)"
      cloud_go_build_tags:
        required: false
        type: string
        default: "s3 billing tenancy"
        description: "Build tags for the cloud binary artifacts"
      upload_to_release:
        required: false
        type: boolean
        default: false
        description: "Whether to upload binaries to a GitHub Release"
      release_prerelease:
        required: false
        type: boolean
        default: false
        description: "Whether to create the target GitHub Release as a prerelease before uploading binaries"
      release_tag_name:
        required: false
        type: string
        description: "The tag name of the release to upload to (required if upload_to_release is true)"
      release_target_sha:
        required: false
        type: string
        default: ""
        description: "Commit SHA to target when creating or updating a prerelease"
      release_title:
        required: false
        type: string
        default: ""
        description: "Title to use when creating or updating a prerelease"
      release_notes:
        required: false
        type: string
        default: ""
        description: "Markdown release notes to use when creating or updating a prerelease"
      docker_tags_summary:
        required: false
        type: string
        default: ""
        description: "Markdown list of Docker tags to append to prerelease notes"
      docker_sha_tag_prefix:
        required: false
        type: string
        default: ""
        description: "Prefix for the short-SHA Docker tag shown in prerelease notes"
    secrets:
      token:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-dashboard:
    name: Build dashboard assets
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Build Dashboard
        working-directory: frontend/dashboard
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod

      - name: Prepare Public Assets
        run: |
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          cp -r frontend/dashboard/dist/dashboard/browser/* public/
          tar -czf public-assets.tar.gz -C public .

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: public-assets-${{ inputs.version }}
          path: public-assets.tar.gz
          retention-days: 5
          compression-level: 0

  build-binaries:
    name: Build ${{ matrix.label }}
    needs: build-dashboard
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - id: linux-amd64
            label: Linux amd64
            runner: ubuntu-22.04
            goos: linux
            goarch: amd64
            artifact_suffix: linux-amd64
            glibc_baseline: "2.35"
          - id: linux-arm64
            label: Linux arm64
            runner: ubuntu-22.04-arm
            goos: linux
            goarch: arm64
            artifact_suffix: linux-arm64
            glibc_baseline: "2.35"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Restore embedded public assets
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$archive" -C public

      - name: Build native Linux binaries on Ubuntu ${{ matrix.glibc_baseline }}
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          HITKEEP_VERSION: ${{ inputs.version }}
          INPUT_CLOUD_GO_BUILD_TAGS: ${{ inputs.cloud_go_build_tags }}
        run: |
          set -euo pipefail
          common_go_build_tags="$(./scripts/go-build-tags.sh)"
          cloud_go_build_tags="$(./scripts/go-build-tags.sh cloud "${INPUT_CLOUD_GO_BUILD_TAGS}")"

          # DuckDB's prebuilt linux bindings currently need a newer libstdc++
          # than Bullseye provides; Ubuntu 22.04 satisfies that requirement.
          export CC=gcc
          export CXX=g++

          go build \
            -tags "${common_go_build_tags}" \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

          go build \
            -tags "${cloud_go_build_tags}" \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-cloud-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.id }}
          path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}
          retention-days: 5
          compression-level: 0

      - name: Attest Binaries
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}

  upload-release-binaries:
    name: Upload release binaries
    needs: build-binaries
    if: ${{ inputs.upload_to_release && inputs.release_tag_name != '' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          path: .
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
          DOCKER_TAGS_SUMMARY: ${{ inputs.docker_tags_summary }}
          DOCKER_SHA_TAG_PREFIX: ${{ inputs.docker_sha_tag_prefix }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          RELEASE_PRERELEASE: ${{ inputs.release_prerelease }}
          RELEASE_TARGET_SHA: ${{ inputs.release_target_sha || github.sha }}
          RELEASE_TAG_NAME: ${{ inputs.release_tag_name }}
          RELEASE_TITLE: ${{ inputs.release_title }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -maxdepth 1 -type f -name 'hitkeep*' -print | sort)
          test "${#files[@]}" -gt 0
          sha256sum "${files[@]}" > SHA256SUMS
          files+=(SHA256SUMS)

          if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
            short_sha="${RELEASE_TARGET_SHA::7}"
            release_title="${RELEASE_TITLE:-Snapshot ${short_sha}}"

            if [[ -n "$RELEASE_NOTES" ]]; then
              printf '%s\n' "$RELEASE_NOTES" > release-notes.md
            else
              cat > release-notes.md <<EOF
          Automated prerelease build for ${RELEASE_TARGET_SHA}.

          - Commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${RELEASE_TARGET_SHA}
          - Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
            fi

            if [[ -n "$DOCKER_TAGS_SUMMARY" ]]; then
              {
                dockerhub_repo="${DOCKERHUB_USERNAME}/hitkeep"
                ghcr_repo="ghcr.io/${GITHUB_REPOSITORY}"
                ghcr_package_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pkgs/container/hitkeep"
                dockerhub_tags_url="https://hub.docker.com/r/${dockerhub_repo}/tags"

                printf '\n## Docker images\n\n'
                printf -- '- GHCR: [%s](%s)\n' "$ghcr_repo" "$ghcr_package_url"
                printf -- '- Docker Hub: [%s](%s)\n\n' "$dockerhub_repo" "$dockerhub_tags_url"
                printf 'Tags:\n\n'
                printf '%s\n' "$DOCKER_TAGS_SUMMARY"

                if [[ -n "$DOCKER_SHA_TAG_PREFIX" ]]; then
                  sha_tag="${DOCKER_SHA_TAG_PREFIX}${short_sha}"
                  printf -- '- `%s`\n' "$sha_tag"
                fi
              } >> release-notes.md
            fi

            if gh release view "${RELEASE_TAG_NAME}" >/dev/null 2>&1; then
              gh release edit "${RELEASE_TAG_NAME}" \
                --prerelease \
                --target "${RELEASE_TARGET_SHA}" \
                --title "${release_title}" \
                --notes-file release-notes.md
              gh release upload "${RELEASE_TAG_NAME}" "${files[@]}" --clobber
            else
              gh release create "${RELEASE_TAG_NAME}" "${files[@]}" \
                --target "${RELEASE_TARGET_SHA}" \
                --prerelease \
                --latest=false \
                --title "${release_title}" \
                --notes-file release-notes.md
            fi

            exit 0
          fi

          gh release upload "${RELEASE_TAG_NAME}" "${files[@]}" --clobber

  build-and-push-image:
    name: Build and push Docker image
    needs:
      - build-dashboard
      - build-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.checkout_ref || github.sha }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-linux-*
          path: .
          merge-multiple: true

      - name: Restore Docker build inputs
        shell: bash
        run: |
          set -euo pipefail

          public_archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$public_archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$public_archive" -C public

          find . -maxdepth 1 -type f -name 'hitkeep-cloud-linux-*' -delete

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          tags: ${{ inputs.meta_config }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        id: push
        with:
          context: .
          provenance: mode=max
          sbom: true
          pull: true
          build-args: HITKEEP_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Attest GHCR Image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub Image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
