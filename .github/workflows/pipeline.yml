name: Build Pipeline

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version string to embed in the binary (e.g., v1.0.0 or snapshot-abc)"
      meta_config:
        required: true
        type: string
        description: "Configuration for docker/metadata-action tags"
      cloud_go_build_tags:
        required: false
        type: string
        default: "s3 billing tenancy"
        description: "Build tags for the cloud binary artifacts"
      build_portable_targets:
        required: false
        type: boolean
        default: false
        description: "Whether to also build native Darwin release binaries"
      upload_to_release:
        required: false
        type: boolean
        default: false
        description: "Whether to upload binaries to a GitHub Release"
      release_tag_name:
        required: false
        type: string
        description: "The tag name of the release to upload to (required if upload_to_release is true)"
    secrets:
      token:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-dashboard:
    name: Build dashboard assets
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Build Dashboard
        working-directory: frontend/dashboard
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod

      - name: Prepare Public Assets
        run: |
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          cp -r frontend/dashboard/dist/dashboard/browser/* public/
          tar -czf public-assets.tar.gz -C public .

      - uses: actions/upload-artifact@v7
        with:
          name: public-assets-${{ inputs.version }}
          path: public-assets.tar.gz
          retention-days: 5
          compression-level: 0

  build-binaries:
    name: Build ${{ matrix.label }}
    needs: build-dashboard
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include: ${{ fromJSON(inputs.build_portable_targets && '[{"id":"linux-amd64","label":"Linux amd64","runner":"ubuntu-22.04","platform":"linux","goos":"linux","goarch":"amd64","artifact_suffix":"linux-amd64","glibc_baseline":"2.35"},{"id":"linux-arm64","label":"Linux arm64","runner":"ubuntu-22.04-arm","platform":"linux","goos":"linux","goarch":"arm64","artifact_suffix":"linux-arm64","glibc_baseline":"2.35"},{"id":"darwin-amd64","label":"macOS amd64","runner":"macos-15-intel","platform":"darwin","goos":"darwin","goarch":"amd64","artifact_suffix":"darwin-amd64"},{"id":"darwin-arm64","label":"macOS arm64","runner":"macos-14","platform":"darwin","goos":"darwin","goarch":"arm64","artifact_suffix":"darwin-arm64"}]' || '[{"id":"linux-amd64","label":"Linux amd64","runner":"ubuntu-22.04","platform":"linux","goos":"linux","goarch":"amd64","artifact_suffix":"linux-amd64","glibc_baseline":"2.35"},{"id":"linux-arm64","label":"Linux arm64","runner":"ubuntu-22.04-arm","platform":"linux","goos":"linux","goarch":"arm64","artifact_suffix":"linux-arm64","glibc_baseline":"2.35"}]') }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/setup-go@v6
        id: setup-go
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Restore embedded public assets
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$archive" -C public

      - name: Build native Linux binaries on Ubuntu ${{ matrix.glibc_baseline }}
        if: ${{ matrix.platform == 'linux' }}
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          HITKEEP_VERSION: ${{ inputs.version }}
          CLOUD_GO_BUILD_TAGS: ${{ inputs.cloud_go_build_tags }}
        run: |
          set -euo pipefail

          # DuckDB's prebuilt linux bindings currently need a newer libstdc++
          # than Bullseye provides; Ubuntu 22.04 satisfies that requirement.
          export CC=gcc
          export CXX=g++

          go build \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

          go build \
            -tags "${CLOUD_GO_BUILD_TAGS}" \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-cloud-linux-${{ matrix.goarch }}" \
            ./cmd/hitkeep/main.go

      - name: Build native ${{ matrix.label }} binaries
        if: ${{ matrix.platform != 'linux' }}
        shell: bash
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          HITKEEP_VERSION: ${{ inputs.version }}
          CLOUD_GO_BUILD_TAGS: ${{ inputs.cloud_go_build_tags }}
        run: |
          set -euo pipefail
          export CC=clang
          export CXX=clang++

          go build \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-${{ matrix.artifact_suffix }}" \
            ./cmd/hitkeep/main.go

          go build \
            -tags "${CLOUD_GO_BUILD_TAGS}" \
            -ldflags="-w -s -X 'hitkeep/cmd.Version=${HITKEEP_VERSION}'" \
            -o "hitkeep-cloud-${{ matrix.artifact_suffix }}" \
            ./cmd/hitkeep/main.go

      - uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.id }}
          path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}
          retention-days: 5
          compression-level: 0

      - name: Attest Binaries
        uses: actions/attest@v4
        with:
          subject-path: |
            hitkeep-${{ matrix.artifact_suffix }}
            hitkeep-cloud-${{ matrix.artifact_suffix }}

  upload-release-binaries:
    name: Upload release binaries
    needs: build-binaries
    if: ${{ inputs.upload_to_release && inputs.release_tag_name != '' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v5
        with:
          pattern: binaries-*
          path: .
          merge-multiple: true

      - name: Upload binaries to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.token }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find . -maxdepth 1 -type f -name 'hitkeep*' -print | sort)
          test "${#files[@]}" -gt 0
          gh release upload "${{ inputs.release_tag_name }}" "${files[@]}" --clobber

  build-and-push-image:
    name: Build and push Docker image
    needs:
      - build-dashboard
      - build-binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v5
        with:
          name: public-assets-${{ inputs.version }}
          path: artifacts/public

      - uses: actions/download-artifact@v5
        with:
          pattern: binaries-linux-*
          path: .
          merge-multiple: true

      - name: Restore Docker build inputs
        shell: bash
        run: |
          set -euo pipefail

          public_archive="$(find artifacts/public -name 'public-assets.tar.gz' -print -quit)"
          test -n "$public_archive"
          mkdir -p public
          find public -mindepth 1 ! -name embed.go -exec rm -rf {} +
          tar -xzf "$public_archive" -C public

          find . -maxdepth 1 -type f -name 'hitkeep-cloud-linux-*' -delete

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          tags: ${{ inputs.meta_config }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          provenance: mode=max
          sbom: true
          build-args: HITKEEP_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest GHCR Image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub Image
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
