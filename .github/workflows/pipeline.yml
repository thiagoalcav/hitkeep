name: Build Pipeline

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version string to embed in the binary (e.g., v1.0.0 or snapshot-abc)"
      meta_config:
        required: true
        type: string
        description: "Configuration for docker/metadata-action tags"
      cloud_go_build_tags:
        required: false
        type: string
        default: "s3 billing tenancy"
        description: "Build tags for the cloud binary artifacts"
      upload_to_release:
        required: false
        type: boolean
        default: false
        description: "Whether to upload binaries to a GitHub Release"
      release_tag_name:
        required: false
        type: string
        description: "The tag name of the release to upload to (required if upload_to_release is true)"
    secrets:
      token:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - uses: actions/setup-go@v6
        id: setup-go
        with:
          go-version-file: go.mod

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Dashboard
        working-directory: frontend/dashboard
        run: |
          npm ci --no-audit --no-fund
          npm run build:prod

      - name: Prepare Public Assets
        run: |
          mkdir -p public
          cp -r frontend/dashboard/dist/dashboard/browser/* public/

      - name: Build Linux Binaries
        env:
          GO_VERSION: ${{ steps.setup-go.outputs.go-version }}
          BUILD_IMAGE: amazonlinux:2023
          HITKEEP_VERSION: ${{ inputs.version }}
          CLOUD_GO_BUILD_TAGS: ${{ inputs.cloud_go_build_tags }}
        run: |
          set -euo pipefail

          build_binary() {
            local platform="$1"
            local goarch="$2"
            local output="$3"
            local build_tags="${4:-}"

            docker run --rm \
              --platform "$platform" \
              -e GO_VERSION="$GO_VERSION" \
              -e CGO_ENABLED=1 \
              -e GOOS=linux \
              -e GOARCH="$goarch" \
              -e GO_TARBALL_ARCH="$goarch" \
              -e HITKEEP_VERSION="$HITKEEP_VERSION" \
              -e BUILD_TAGS="$build_tags" \
              -e OUTPUT_NAME="$output" \
              -e HOST_UID="$(id -u)" \
              -e HOST_GID="$(id -g)" \
              -v "$PWD:/src" \
              -w /src \
              "$BUILD_IMAGE" \
              bash -lc '
                set -euo pipefail

                dnf install -y gcc gcc-c++ tar gzip xz git

                curl -fsSL "https://go.dev/dl/go${GO_VERSION}.linux-${GO_TARBALL_ARCH}.tar.gz" -o /tmp/go.tgz
                rm -rf /usr/local/go
                tar -C /usr/local -xzf /tmp/go.tgz
                export PATH=/usr/local/go/bin:$PATH

                export CC=gcc
                export CXX=g++

                tag_args=()
                if [ -n "$BUILD_TAGS" ]; then
                  tag_args=(-tags "$BUILD_TAGS")
                fi

                go build \
                  "${tag_args[@]}" \
                  -ldflags="-w -s -X '\''hitkeep/cmd.Version=$HITKEEP_VERSION'\''" \
                  -o "$OUTPUT_NAME" \
                  ./cmd/hitkeep/main.go

                chown "$HOST_UID:$HOST_GID" "$OUTPUT_NAME"
              '
          }

          build_binary linux/amd64 amd64 hitkeep-linux-amd64
          build_binary linux/arm64 arm64 hitkeep-linux-arm64
          build_binary linux/amd64 amd64 hitkeep-cloud-linux-amd64 "$CLOUD_GO_BUILD_TAGS"
          build_binary linux/arm64 arm64 hitkeep-cloud-linux-arm64 "$CLOUD_GO_BUILD_TAGS"

      - uses: actions/upload-artifact@v7
        with:
          name: hitkeep-binaries-${{ inputs.version }}
          path: |
            hitkeep-linux-amd64
            hitkeep-linux-arm64
            hitkeep-cloud-linux-amd64
            hitkeep-cloud-linux-arm64
          retention-days: 5

      - name: Attest Binaries
        uses: actions/attest@v4
        with:
          subject-path: |
            hitkeep-linux-amd64
            hitkeep-linux-arm64
            hitkeep-cloud-linux-amd64
            hitkeep-cloud-linux-arm64

      - name: Upload Release Binaries
        if: ${{ inputs.upload_to_release && inputs.release_tag_name != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.release_tag_name }} \
            hitkeep-linux-amd64 \
            hitkeep-linux-arm64 \
            hitkeep-cloud-linux-amd64 \
            hitkeep-cloud-linux-arm64

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          tags: ${{ inputs.meta_config }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        id: push
        with:
          context: .
          provenance: mode=max
          sbom: true
          build-args: HITKEEP_VERSION=${{ inputs.version }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest GHCR Image
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Attest Docker Hub Image
        uses: actions/attest@v4
        with:
          subject-name: index.docker.io/${{ secrets.DOCKERHUB_USERNAME }}/hitkeep
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
