name: Publish MCP Registry Metadata

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: frontend/dashboard/.nvmrc

      - name: Validate MCP registry metadata
        run: tests/scripts/mcp-audit.sh --schema-only

      - name: Verify tag matches server version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          server_version="$(jq -r '.version' server.json)"
          if [[ "$tag_version" != "$server_version" ]]; then
            echo "Tag version ${tag_version} does not match server.json version ${server_version}." >&2
            exit 1
          fi

      - name: Install mcp-publisher
        shell: bash
        run: |
          set -euo pipefail
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish MCP registry metadata
        run: ./mcp-publisher publish server.json
