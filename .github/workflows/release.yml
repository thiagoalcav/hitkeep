name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GHT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/pipeline.yml
    with:
      version: ${{ needs.release-please.outputs.tag_name }}
      meta_config: |
        type=raw,value=latest
        type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
        type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
        type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
      build_portable_targets: true
      upload_to_release: true
      release_tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      token: ${{ secrets.GHT }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          CHART_VERSION="${TAG#v}"
          helm package charts/hitkeep --version "$CHART_VERSION" --app-version "$TAG"

      - name: Push chart
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          CHART_VERSION="${TAG#v}"
          helm push "hitkeep-${CHART_VERSION}.tgz" "oci://ghcr.io/pascalebeier/charts"
