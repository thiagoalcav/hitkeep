name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write
jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GHT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/pipeline.yml
    with:
      version: ${{ needs.release-please.outputs.tag_name }}
      meta_config: |
        type=raw,value=latest
        type=semver,pattern={{version}},value=${{ needs.release-please.outputs.tag_name }}
        type=semver,pattern={{major}}.{{minor}},value=${{ needs.release-please.outputs.tag_name }}
        type=semver,pattern={{major}},value=${{ needs.release-please.outputs.tag_name }}
      upload_to_release: true
      release_tag_name: ${{ needs.release-please.outputs.tag_name }}
    secrets:
      token: ${{ secrets.GHT }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  link-release-blog:
    name: Link release blog
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Add release blog link to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GHT }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail

          VERSION="${TAG#v}"
          BLOG_SLUG="hitkeep-${VERSION//./-}"
          BLOG_URL="https://hitkeep.com/blog/${BLOG_SLUG}/"

          if ! curl -fsSLI "$BLOG_URL" >/dev/null; then
            echo "::warning::Release blog URL did not respond successfully yet: $BLOG_URL"
          fi

          release_found=false
          for attempt in {1..5}; do
            if gh release view "$TAG" --json body --jq .body > release-notes.md; then
              release_found=true
              break
            fi
            sleep 2
          done

          if [[ "$release_found" != "true" ]]; then
            echo "GitHub Release $TAG was not found"
            exit 1
          fi

          if grep -Fq "$BLOG_URL" release-notes.md; then
            echo "Release blog link already present"
            exit 0
          fi

          {
            printf '**Release blog:** [HitKeep %s](%s)\n\n' "$VERSION" "$BLOG_URL"
            cat release-notes.md
          } > updated-release-notes.md

          gh release edit "$TAG" --notes-file updated-release-notes.md

  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GHT }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          CHART_VERSION="${TAG#v}"
          helm package charts/hitkeep --version "$CHART_VERSION" --app-version "$TAG"

      - name: Push chart
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          CHART_VERSION="${TAG#v}"
          helm push "hitkeep-${CHART_VERSION}.tgz" "oci://ghcr.io/pascalebeier/charts"
