name: Snapshot

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  snapshot:
    if: "${{ !startsWith(github.event.head_commit.message, 'chore(main): release') }}"
    uses: ./.github/workflows/pipeline.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      version: snapshot-${{ github.sha }}
      meta_config: |
          type=raw,value=snapshot
          type=sha,prefix=sha-,format=short
      upload_to_release: false
    secrets:
      token: ${{ secrets.GHT }}