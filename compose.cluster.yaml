services:
  hitkeep-leader:
    build: .
    container_name: hitkeep-leader
    environment:
      HITKEEP_NODE_NAME: hk-1
      HITKEEP_PUBLIC_URL: http://localhost:8080
      HITKEEP_JWT_SECRET: dev-secret-change-me
      HITKEEP_LOG_LEVEL: info
    ports:
      - "8080:8080"
    expose:
      - "7946/tcp"
      - "7946/udp"
    volumes:
      - hitkeep-data:/var/lib/hitkeep/data
    networks:
      - hitkeep-net

  hitkeep-node-2:
    build: .
    container_name: hitkeep-node-2
    depends_on:
      - hitkeep-leader
    environment:
      HITKEEP_NODE_NAME: hk-2
      HITKEEP_JOIN_ADDR: hitkeep-leader:7946
      HITKEEP_PUBLIC_URL: http://localhost:8080
      HITKEEP_JWT_SECRET: dev-secret-change-me
      HITKEEP_LOG_LEVEL: info
    expose:
      - "7946/tcp"
      - "7946/udp"
    networks:
      - hitkeep-net

  hitkeep-node-3:
    build: .
    container_name: hitkeep-node-3
    depends_on:
      - hitkeep-leader
    environment:
      HITKEEP_NODE_NAME: hk-3
      HITKEEP_JOIN_ADDR: hitkeep-leader:7946
      HITKEEP_PUBLIC_URL: http://localhost:8080
      HITKEEP_JWT_SECRET: dev-secret-change-me
      HITKEEP_LOG_LEVEL: info
    expose:
      - "7946/tcp"
      - "7946/udp"
    networks:
      - hitkeep-net

volumes:
  hitkeep-data: {}

networks:
  hitkeep-net: {}
