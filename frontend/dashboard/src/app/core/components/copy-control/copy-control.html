<p-button
    [cdkCopyToClipboard]="copyValue()"
    type="button"
    [icon]="icon()"
    [label]="currentLabelKey() | transloco"
    [ariaLabel]="ariaLabelKey() | transloco"
    [disabled]="isDisabled()"
    [severity]="severity()"
    [text]="text()"
    [rounded]="rounded()"
    [fluid]="fluid()"
    [size]="size()"
    [styleClass]="styleClass()"
    (cdkCopyToClipboardCopied)="onCopied($event)"
/>
<span class="copy-control-live" aria-live="polite" aria-atomic="true">{{ liveMessageKey() ? (liveMessageKey() | transloco) : "" }}</span>
