<div class="range-toolbar">
    <div class="range-toolbar__controls">
        <span class="p-buttonset range-toolbar__presets" [attr.aria-label]="'common.timeRangeSelectorAria' | transloco" role="group">
            @for (option of presetRanges(); track option.value) {
            <button
                type="button"
                pButton
                size="small"
                class="range-toolbar__preset-button"
                [class.range-toolbar__preset-button--active]="isPresetActive(option.value)"
                [label]="option.shortLabel"
                [attr.aria-pressed]="isPresetActive(option.value)"
                [attr.aria-label]="option.label"
                [pTooltip]="option.label"
                tooltipPosition="bottom"
                (click)="selectPreset(option)"
            ></button>
            }
            <button
                type="button"
                pButton
                size="small"
                class="range-toolbar__preset-button"
                [class.range-toolbar__preset-button--active]="isCustomActive()"
                [label]="customButtonLabel()"
                [attr.aria-pressed]="isCustomActive()"
                [attr.aria-label]="'common.timeRanges.openCustomRangeAria' | transloco"
                [pTooltip]="customRangeSummary() ?? undefined"
                tooltipPosition="bottom"
                (click)="toggleCustomRange($event, customPopover)"
            ></button>
        </span>

        @if (customRangeSummary(); as summary) {
        <div class="range-toolbar__summary" [attr.aria-label]="'common.timeRanges.customRange' | transloco">{{ summary }}</div>
        }

        <p-popover #customPopover>
            <div class="range-toolbar__popover">
                <div class="range-toolbar__popover-header">
                    <h3 class="range-toolbar__popover-title">{{ "common.selectDateRange" | transloco }}</h3>
                    <p class="range-toolbar__popover-copy">{{ "common.timeRanges.customRangeHint" | transloco }}</p>
                </div>

                <div class="range-toolbar__fields">
                    <div class="range-toolbar__field">
                        <label for="range-custom-start" class="range-toolbar__field-label">{{ "common.timeRanges.customStart" | transloco }}</label>
                        <p-datepicker inputId="range-custom-start" [formControl]="rangeForm.customStart().control()" [showTime]="true" hourFormat="24" [showIcon]="true" iconDisplay="input" appendTo="body" />
                    </div>

                    <div class="range-toolbar__field">
                        <label for="range-custom-end" class="range-toolbar__field-label">{{ "common.timeRanges.customEnd" | transloco }}</label>
                        <p-datepicker inputId="range-custom-end" [formControl]="rangeForm.customEnd().control()" [showTime]="true" hourFormat="24" [showIcon]="true" iconDisplay="input" appendTo="body" />
                    </div>
                </div>

                <div class="range-toolbar__actions">
                    <p-button [label]="'common.actions.cancel' | transloco" severity="secondary" styleClass="p-button-text" size="small" (onClick)="cancelCustomRange(customPopover)" />
                    <p-button [label]="'common.actions.apply' | transloco" size="small" [disabled]="!canApplyCustomRange()" (onClick)="applyCustomRange(customPopover)" />
                </div>
            </div>
        </p-popover>

        <p-button
            icon="pi pi-refresh"
            [label]="'common.actions.refresh' | transloco"
            loadingIcon="pi pi-refresh"
            (onClick)="refresh.emit()"
            [loading]="loading()"
            class="range-toolbar__refresh"
            [pTooltip]="'common.refreshDataTooltip' | transloco"
            tooltipPosition="bottom"
            [outlined]="true"
            severity="secondary"
            size="small"
        />
    </div>

    <ng-content select="[toolbar-right]"></ng-content>
</div>
