<div class="md:hidden flex flex-col gap-3 p-4 bg-surface-card border-b border-surface-200 dark:border-surface-700">
    <div class="flex items-center justify-between">
        <app-brand size="small" />
        <div class="flex items-center gap-2">
            <app-user-controls [showMenu]="!shareService.isShareMode()" />
            <button type="button" (click)="isMobileDrawerOpen.set(true)" class="p-2 rounded hover:bg-surface-100 dark:hover:bg-surface-800" [attr.aria-label]="'nav.mainSidebarAria' | transloco">
                <i class="pi pi-bars text-xl" aria-hidden="true"></i>
            </button>
        </div>
    </div>
    @if (!shareService.isShareMode()) {
    <app-team-switcher
        [teams]="teamService.teams()"
        [currentTeamId]="teamService.activeTeamId()"
        [loading]="teamService.isLoading()"
        [switching]="teamService.isSwitching()"
        [showBrand]="false"
        [showAdd]="canCreateTeams()"
        [compact]="true"
        [beforeSwitch]="beforeTeamSwitch"
        (teamSelected)="context.onTeamSelected($event)"
        (addClicked)="isCreateTeamVisible.set(true)"
    />
    }
</div>
