<p-drawer [visible]="visible()" (visibleChange)="onVisibleChange($event)" position="right" [style]="{ width: 'var(--site-settings-drawer-width)', maxWidth: '90vw' }">
    <div class="flex flex-col h-full">
        <div class="flex items-center gap-2 text-sm text-muted-color mb-4">
            <span>Sites</span>
            <i class="pi pi-angle-right"></i>
            <span class="font-medium text-primary">{{ site()?.domain }}</span>
            <i class="pi pi-angle-right"></i>
            <span>Settings</span>
        </div>

        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-xl font-bold">Site Settings</h2>
            </div>
        </div>

        <p-tabs [(value)]="activeTab" styleClass="flex-1">
            <p-tablist>
                <p-tab value="0">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-cog"></i>
                        <span>General</span>
                    </div>
                </p-tab>
                <p-tab value="1">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-code"></i>
                        <span>Tracking</span>
                    </div>
                </p-tab>
                <p-tab value="2">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-history"></i>
                        <span>Retention</span>
                    </div>
                </p-tab>
                <p-tab value="3">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-users"></i>
                        <span>Team</span>
                    </div>
                </p-tab>
                <p-tab value="4">
                    <div class="flex items-center gap-2">
                        <i class="pi pi-exclamation-triangle"></i>
                        <span>Danger Zone</span>
                    </div>
                </p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel value="0">
                    <app-site-general-settings [site]="site()" />
                </p-tabpanel>
                <p-tabpanel value="1">
                    <app-site-tracking-settings [site]="site()" />
                </p-tabpanel>
                <p-tabpanel value="2">
                    <app-site-retention-settings [site]="site()" />
                </p-tabpanel>
                <p-tabpanel value="3">
                    <app-site-team-settings [site]="site()" />
                </p-tabpanel>
                <p-tabpanel value="4">
                    <app-site-danger-zone [site]="site()" />
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    </div>
</p-drawer>
