<div class="flex flex-col w-full">
  <app-page-header>
    <div header-left>
      <app-page-breadcrumb [items]="breadcrumbItems" />
    </div>
  </app-page-header>

  <div class="max-w-6xl mx-auto w-full">
    <p-tabs value="0">
      <p-tablist>
          <p-tab value="0">Users</p-tab>
          <p-tab value="1">Sites</p-tab>
      </p-tablist>
      <p-tabpanels>
          <p-tabpanel value="0">
              <p-card>
                  <h2 class="text-lg font-semibold mb-4">Users</h2>
                  
                  <p-table [value]="users()" [loading]="isLoading()">
                  <ng-template pTemplate="header">
                      <tr>
                      <th>Email</th>
                      <th>Role</th>
                      <th>Created</th>
                      <th>Actions</th>
                      </tr>
                  </ng-template>
                  
                  <ng-template pTemplate="body" let-user>
                      <tr>
                      <td>{{ user.email }}</td>
                      <td>
                          <p-select
                          [options]="roleOptions"
                          [(ngModel)]="user.instance_role"
                          (onChange)="updateUserRole(user)"
                          optionLabel="label"
                          optionValue="value"
                          [disabled]="user.id === currentUserId()"
                          class="w-40" />
                      </td>
                      <td>{{ user.created_at | date:'short' }}</td>
                      <td>
                          <p-button
                          icon="pi pi-trash"
                          severity="danger"
                          [text]="true"
                          (onClick)="deleteUser(user)"
                          [disabled]="user.id === currentUserId()" />
                      </td>
                      </tr>
                  </ng-template>
                  </p-table>
              </p-card>
          </p-tabpanel>
          <p-tabpanel value="1">
              <p-card>
                  <h2 class="text-lg font-semibold mb-4">Sites</h2>
                  
                  <p-table [value]="sites()" [loading]="isLoadingSites()">
                  <ng-template pTemplate="header">
                      <tr>
                      <th>Domain</th>
                      <th>Created</th>
                      <th>Actions</th>
                      </tr>
                  </ng-template>
                  
                  <ng-template pTemplate="body" let-site>
                      <tr>
                      <td>
                          <a [href]="'https://' + site.domain" target="_blank" class="text-primary hover:underline">
                              {{ site.domain }}
                          </a>
                      </td>
                      <td>{{ site.created_at | date:'short' }}</td>
                      <td>
                          <p-button
                          icon="pi pi-trash"
                          severity="danger"
                          [text]="true"
                          (onClick)="deleteSite(site)" />
                      </td>
                      </tr>
                  </ng-template>
                  </p-table>
              </p-card>
          </p-tabpanel>
      </p-tabpanels>
    </p-tabs>
  </div>
</div>
