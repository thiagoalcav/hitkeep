<div class="flex flex-col w-full">
    <app-page-header>
        <div header-left>
            <app-page-breadcrumb [items]="breadcrumbItems()" />
        </div>
    </app-page-header>

    <div class="max-w-6xl mx-auto w-full">
        <p-tabs [(value)]="activeTab">
            <p-tablist>
                <p-tab value="0">{{ "admin.team.tabs.overview" | transloco }}</p-tab>
                <p-tab value="1">{{ "admin.team.tabs.members" | transloco }}</p-tab>
                <p-tab value="2">{{ "admin.team.tabs.settings" | transloco }}</p-tab>
                <p-tab value="3">{{ "admin.team.tabs.activity" | transloco }}</p-tab>
            </p-tablist>
            <p-tabpanels>
                <p-tabpanel value="0">
                    <app-team-overview />
                </p-tabpanel>
                <p-tabpanel value="1">
                    <app-team-members />
                </p-tabpanel>
                <p-tabpanel value="2">
                    <app-team-settings />
                </p-tabpanel>
                <p-tabpanel value="3">
                    <app-team-audit />
                </p-tabpanel>
            </p-tabpanels>
        </p-tabs>
    </div>
</div>
