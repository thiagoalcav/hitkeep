<div class="flex flex-col w-full">
    <app-page-header>
        <div header-left>
            <app-page-breadcrumb [items]="breadcrumbItems()" />
            <p class="text-sm text-[var(--p-text-muted-color)]">{{ "integration.apiReference.subtitle" | transloco }}</p>
        </div>
    </app-page-header>

    <div class="api-reference-content max-w-7xl mx-auto w-full">
        @if (error(); as errorKey) {
            <div class="rounded-md border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
                {{ errorKey | transloco }}
            </div>
        }

        @if (!viewerReady() && !error()) {
            <div class="api-reference-loading text-sm text-[var(--p-text-muted-color)]">
                {{ "integration.apiReference.loading" | transloco }}
            </div>
        }

        <div #referenceContainer class="api-reference-viewer" [class.hidden]="!viewerReady()"></div>
    </div>
</div>
