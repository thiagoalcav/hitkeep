<div class="max-w-3xl mx-auto w-full">
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-[var(--p-text-color)]">User Settings</h1>
    <p class="text-sm text-[var(--p-text-muted-color)]">Manage your account security and preferences.</p>
  </div>

  <div class="flex flex-col gap-6">
    <app-settings-security />

    <div class="p-6 border rounded-xl bg-surface-0 dark:bg-surface-900 border-surface-200 dark:border-surface-700">
      <h2 class="text-lg font-semibold mb-4 text-[var(--p-text-color)]">Data Export</h2>
      <div class="flex items-center justify-between">
        <div>
          <div class="font-medium text-[var(--p-text-color)]">Export All Data</div>
          <div class="text-sm text-[var(--p-text-muted-color)]">Download all your data across all sites as an XLSX file.</div>
        </div>
        <p-button
          label="Download Data"
          icon="pi pi-download"
          [outlined]="true"
          (onClick)="downloadData()" />
      </div>
    </div>
  </div>
</div>
