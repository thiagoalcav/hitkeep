<section class="share-shell">
    @if (loading()) {
        <div class="share-state">
            <i class="pi pi-spin pi-spinner text-2xl"></i>
            <p class="text-sm text-muted-color">Loading shared dashboard…</p>
        </div>
    } @else if (error()) {
        <div class="share-state">
            <i class="pi pi-exclamation-triangle text-2xl text-orange-500"></i>
            <p class="text-sm text-muted-color">{{ error() }}</p>
        </div>
    } @else {
        <app-dashboard />
    }
</section>
