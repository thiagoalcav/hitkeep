<div class="setup-container">
  <div class="setup-card">
    <div class="text-center mb-6">
        <h1>Welcome to HitKeep</h1>
        <p>Create your administrator account to get started.</p>
    </div>

    <form [formGroup]="setupForm" (ngSubmit)="onSubmit()">
      <!-- Error Banner -->
      @if (errorMessage) {
        <div class="error-banner animate-scalein">
            <i class="pi pi-exclamation-circle"></i>
            <span>{{ errorMessage }}</span>
        </div>
      }

      <div class="field">
        <label for="email">Email Address</label>
        <input 
            pInputText 
            id="email" 
            formControlName="email" 
            class="p-inputtext-lg w-full" 
            placeholder="admin@example.com"
            autofocus />
      </div>
      
      <div class="field">
        <label for="password">Password</label>
        <p-password 
            id="password" 
            formControlName="password" 
            [toggleMask]="true" 
            styleClass="w-full" 
            inputStyleClass="w-full p-inputtext-lg"
            [feedback]="true"
            placeholder="••••••••">
        </p-password>
      </div>

      <p-button 
        label="Create Admin Account" 
        type="submit" 
        [loading]="isLoading" 
        styleClass="w-full" 
        size="large">
      </p-button>
    </form>
  </div>
</div>
